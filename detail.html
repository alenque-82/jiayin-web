<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产品详情页</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#0c0f14;
      --panel:#151922;
      --card:#171c25;
      --text:#f5efe5;
      --sub:#a4adba;
      --gold:#d0a15f;
      --gold2:#b9833f;
      --line:rgba(255,255,255,.06);
      --shadow:0 12px 28px rgba(0,0,0,.24);
      --radius:20px;
    }

    body{
      margin:0;
      background:
        radial-gradient(circle at top, #212735 0%, #12161d 42%, #090b10 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }

    .phone{
      width:390px;
      margin:14px auto;
      background: linear-gradient(180deg, #0f131a 0%, #0b0d12 100%);
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.05);
      box-shadow:0 18px 52px rgba(0,0,0,.34);
      min-height:100vh;
      padding-bottom:16px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 14px;
      background:rgba(8,10,14,.76);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.04);
    }

    .back{
      color:#fff;
      font-size:14px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:6px;
      opacity:.95;
    }

    .title{
      font-size:15px;
      font-weight:800;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:220px;
    }

    .chip{
      padding:6px 10px;
      border-radius:999px;
      background:rgba(208,161,95,.10);
      color:#efd8b5;
      font-size:11px;
      border:1px solid rgba(208,161,95,.14);
      flex-shrink:0;
    }

    .section{
      margin:10px 12px 0;
      padding:10px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(24,29,38,.96) 0%, rgba(16,20,27,.96) 100%);
      border:1px solid rgba(255,255,255,.05);
      box-shadow:var(--shadow);
    }

    .hero-img{
      width:100%;
      border-radius:18px;
      overflow:hidden;
      background:#0d1015;
      border:1px solid rgba(255,255,255,.05);
    }

    .hero-img img{
      width:100%;
      height:auto;
      display:block;
      object-fit:contain;
      background:#0d1015;
    }

    .product-meta{
      margin-top:12px;
    }

    .product-name{
      font-size:18px;
      line-height:1.35;
      font-weight:900;
      color:#fff;
    }

    .product-sub{
      margin-top:6px;
      font-size:11px;
      color:#d7b27a;
      font-weight:700;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:10px;
    }

    .tag{
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      color:#e8dcc7;
      font-size:10px;
      border:1px solid rgba(255,255,255,.05);
    }

    .desc{
      margin-top:10px;
      font-size:12px;
      line-height:1.7;
      color:var(--sub);
    }

    .detail-title{
      margin:0 0 10px 0;
      font-size:16px;
      font-weight:900;
      color:#fff;
    }

    .detail-img{
      width:100%;
      display:block;
      border-radius:18px;
      background:#0d1015;
      border:1px solid rgba(255,255,255,.05);
    }

    .info-line{
      font-size:12px;
      line-height:1.75;
      color:#f4ede1;
      margin-top:4px;
    }

    .info-line:first-of-type{
      margin-top:0;
    }

    .info-label{
      color:#d8ba8b;
      font-weight:700;
    }

    .contact-title{
      margin:0;
      font-size:16px;
      font-weight:900;
      color:#fff;
    }

    .contact-tip{
      margin-top:6px;
      font-size:11px;
      line-height:1.55;
      color:var(--sub);
    }

    .contact-line{
      margin-top:6px;
      font-size:12px;
      line-height:1.75;
      color:#f4ede1;
    }

    .contact-line:first-child{
      margin-top:10px;
    }

    .contact-label-inline{
      color:#d8ba8b;
      font-weight:700;
    }

    .actions{
      display:flex;
      gap:8px;
      margin-top:10px;
    }

    .btn{
      flex:1;
      height:40px;
      line-height:40px;
      text-align:center;
      text-decoration:none;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      display:inline-block;
    }

    .btn-primary{
      background:linear-gradient(180deg,#ddb57b 0%, #c89a57 100%);
      color:#16120d;
      box-shadow:0 8px 16px rgba(200,154,87,.20);
    }

    .btn-ghost{
      color:#fff;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    @media (max-width:420px){
      .phone{
        width:100%;
        margin:0;
        border-radius:0;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <a class="back" href="javascript:history.back()">← 返回</a>
      <div class="title">KT7112 详情页</div>
      <div class="chip">产品详情</div>
    </div>

    <section class="section">
      <div class="hero-img">
        <img src="./KT-7112.png" alt="KT7112 主图" />
      </div>

      <div class="product-meta">
        <div class="product-name">KT7112</div>
        <div class="product-sub">主推产品 · 家庭 / 娱乐</div>

        <div class="tags">
          <span class="tag">家庭娱乐</span>
          <span class="tag">K歌场景</span>
          <span class="tag">产品展播</span>
          <span class="tag">主推型号</span>
        </div>

        <div class="desc">
          适合家庭娱乐、客厅影音、聚会互动等场景，主打产品展示与使用体验。
        </div>
      </div>
    </section>

    <section class="section">
      <h3 class="detail-title">产品详情</h3>
      <img class="detail-img" src="./dt-KT-7112.png" alt="KT7112 详情图" />
    </section>

    <section class="section">
      <h3 class="detail-title">产品信息</h3>
      <div class="info-line"><span class="info-label">产品名称：</span>KT7112</div>
      <div class="info-line"><span class="info-label">适用场景：</span>家庭娱乐、K歌、影音空间</div>
      <div class="info-line"><span class="info-label">产品定位：</span>主推展示型号，适合首页重点展示</div>
    </section>

    <section class="section">
      <h2 class="contact-title">联系我们</h2>
      <div class="contact-tip">如需了解更多参数或到店体验，可直接联系。</div>

      <div class="contact-line"><span class="contact-label-inline">电话：</span>13960339779（微信同号）</div>
      <div class="contact-line"><span class="contact-label-inline">地址：</span>泉州关帝庙对面泉州佳音音响专卖店</div>

      <div class="actions">
        <a class="btn btn-primary" href="tel:13960339779">立即咨询</a>
        <a class="btn btn-ghost" href="javascript:void(0)">添加微信</a>
      </div>
    </section>
  </div>
</body>
</html>
